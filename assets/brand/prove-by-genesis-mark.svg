<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="PROVE BY GENESIS mark">
  <!-- Gate-G perimeter: rounded square with controlled opening on the right side
       The opening is the gate passage; the path traces 3/4 of the boundary -->
  <path d="M 37.5,16 L 37.5,8 Q 37.5,2.5 32,2.5 L 8,2.5 Q 2.5,2.5 2.5,8 L 2.5,32 Q 2.5,37.5 8,37.5 L 32,37.5 Q 37.5,37.5 37.5,32 L 37.5,27"
        stroke="#4a7fe0" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- G spur: gate control line entering from the right at mid-opening
       Reads as the execution threshold; secondary reading: the G crossbar -->
  <line x1="37.5" y1="21.5" x2="23" y2="21.5"
        stroke="#4a7fe0" stroke-width="2.5" stroke-linecap="round"/>
</svg>
