<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" rx="12" fill="url(#bg)" />

  <!-- Top accent bar -->
  <rect width="900" height="3" rx="0" fill="url(#accent)" />

  <!-- Left vertical accent line -->
  <rect x="48" y="30" width="3" height="160" rx="2" fill="url(#accent)" />

  <!-- Main title -->
  <text x="72" y="82" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="32" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">AI Code Safety Gate</text>

  <!-- Subtitle -->
  <text x="72" y="116" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="15" fill="#8b949e" letter-spacing="0.2">Pre-execution safety for AI-generated code.</text>

  <!-- Tagline -->
  <text x="72" y="148" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="13" fill="#6e7681">Evaluates every change before it runs. Explicit decisions. No silent failures.</text>

  <!-- ALLOW badge -->
  <rect x="72" y="168" width="108" height="30" rx="6" fill="#0f2a1a" stroke="#3fb950" stroke-width="1.5" />
  <text x="126" y="188" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle" letter-spacing="1">ALLOW</text>

  <!-- REQUIRE_APPROVAL badge -->
  <rect x="194" y="168" width="196" height="30" rx="6" fill="#2a1f00" stroke="#d29922" stroke-width="1.5" />
  <text x="292" y="188" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12" font-weight="700" fill="#d29922" text-anchor="middle" letter-spacing="0.5">REQUIRE_APPROVAL</text>

  <!-- BLOCK badge -->
  <rect x="404" y="168" width="100" height="30" rx="6" fill="#2a0f0f" stroke="#f85149" stroke-width="1.5" />
  <text x="454" y="188" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12" font-weight="700" fill="#f85149" text-anchor="middle" letter-spacing="1">BLOCK</text>

  <!-- Right side — architecture label -->
  <rect x="620" y="50" width="240" height="120" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1" />
  <text x="740" y="78" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#6e7681" text-anchor="middle">AI Tool Output</text>
  <text x="740" y="94" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="14" fill="#6e7681" text-anchor="middle">↓</text>
  <rect x="660" y="102" width="160" height="28" rx="5" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" />
  <text x="740" y="121" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">Safety Gate</text>
  <text x="740" y="148" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="14" fill="#6e7681" text-anchor="middle">↓</text>
  <text x="740" y="164" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="11" fill="#8b949e" text-anchor="middle">Decision</text>
</svg>
