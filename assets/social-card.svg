<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- Background -->
  <rect width="1200" height="630" fill="#070b14"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#4a7fe0" opacity="0.7"/>

  <!-- Inner surface panel -->
  <rect x="72" y="64" width="1056" height="502" rx="14" fill="#0c1020" stroke="#1a2236" stroke-width="1"/>

  <!-- Left edge accent -->
  <rect x="72" y="64" width="3" height="502" rx="1.5" fill="#4a7fe0" opacity="0.5"/>

  <!--
    Gate mark — centered, scaled to ~58px
    ¾ open-right rounded rectangle (48×48 viewbox, r=9)
    Opening: right side, y=17 to y=31 (center 30%)
    Horizontal spur: enters from x=48 at y=24, extends to x=35
    Transform: centered at x=600, top at y=112
  -->
  <g transform="translate(571,112) scale(1.21)">
    <path
      d="M 48,17 L 48,9 Q 48,0 39,0 L 9,0 Q 0,0 0,9 L 0,39 Q 0,48 9,48 L 39,48 Q 48,48 48,39 L 48,31"
      fill="none" stroke="#4a7fe0" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="48" y1="24" x2="35" y2="24"
      stroke="#4a7fe0" stroke-width="3.2" stroke-linecap="round"/>
  </g>

  <!-- "PROVE BY" label -->
  <text x="600" y="198"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="600" letter-spacing="6" text-anchor="middle"
    fill="#4a7fe0">PROVE BY</text>

  <!-- GENESIS -->
  <text x="600" y="295"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="88" font-weight="700" letter-spacing="10" text-anchor="middle"
    fill="#eef2fc">GENESIS</text>

  <!-- Subtitle -->
  <text x="600" y="345"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22" font-weight="400" letter-spacing="1" text-anchor="middle"
    fill="#6b7a96">AI Code Safety Gate</text>

  <!-- Horizontal rule -->
  <line x1="476" y1="376" x2="724" y2="376" stroke="#1a2236" stroke-width="1"/>

  <!-- Decision badges -->
  <!-- ALLOW -->
  <rect x="252" y="396" width="172" height="46" rx="8" fill="#166534"/>
  <text x="338" y="426"
    font-family="'Courier New', Courier, monospace"
    font-size="16" font-weight="700" letter-spacing="3" text-anchor="middle"
    fill="#bbf7d0">ALLOW</text>

  <!-- REQUIRE_APPROVAL -->
  <rect x="444" y="396" width="312" height="46" rx="8" fill="#78350f"/>
  <text x="600" y="426"
    font-family="'Courier New', Courier, monospace"
    font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle"
    fill="#fef3c7">REQUIRE_APPROVAL</text>

  <!-- BLOCK -->
  <rect x="776" y="396" width="172" height="46" rx="8" fill="#7f1d1d"/>
  <text x="862" y="426"
    font-family="'Courier New', Courier, monospace"
    font-size="16" font-weight="700" letter-spacing="3" text-anchor="middle"
    fill="#fecaca">BLOCK</text>

  <!-- Tagline -->
  <text x="600" y="496"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="19" font-weight="400" text-anchor="middle"
    fill="#6b7a96">Stop risky AI-generated code before execution.</text>

  <!-- URL -->
  <text x="600" y="532"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="400" letter-spacing="3" text-anchor="middle"
    fill="#3d4a63">aicodesafety.com</text>

</svg>
